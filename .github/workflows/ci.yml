name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - improvement/**

jobs:
  api:
    name: API build and audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build API
        run: npm run build

      - name: Audit API dependencies
        run: npm audit --audit-level=high

      - name: Run rate-limit regression tests
        run: npm run test:rate-limit

  web:
    name: Web build and audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: superflow-web/package-lock.json

      - name: Install dependencies
        working-directory: superflow-web
        run: npm ci

      - name: Build web
        working-directory: superflow-web
        run: npm run build

      - name: Audit web dependencies
        working-directory: superflow-web
        run: npm audit --audit-level=high

  db-security-tests:
    name: DB-backed security tests
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: superflow_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/superflow_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Write test environment
        run: echo "DATABASE_URL=${DATABASE_URL}" > .env

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push Prisma schema
        run: npx prisma db push --accept-data-loss

      - name: Run auth security tests
        run: npm run test:auth-security

      - name: Run file security tests
        run: npm run test:file-security

      - name: Run tenant isolation tests
        run: npm run test:tenant
