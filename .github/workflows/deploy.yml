name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            superflow-web/package-lock.json

      - name: Install API dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build API
        run: npm run build

      - name: Install web dependencies
        working-directory: superflow-web
        run: npm ci

      - name: Build web
        working-directory: superflow-web
        run: npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /home/super-service-app
            git fetch --all
            git checkout main
            git pull origin main

            if [ ! -f .env ] && [ -f .env.example ]; then
              echo "Missing .env on VPS. Copy .env.example and fill real values first."
              exit 1
            fi

            docker compose pull || true
            docker compose build api web
            docker compose up -d redis api web

            echo "Waiting for services to become healthy..."
            sleep 10

            API_URL="http://127.0.0.1:${API_BIND_PORT:-3000}/health"
            WEB_URL="http://127.0.0.1:${WEB_BIND_PORT:-3001}"

            if ! wget -qO- "$API_URL" >/dev/null 2>&1; then
              echo "API smoke check failed: $API_URL"
              docker compose ps
              docker compose logs --tail=80 api
              exit 1
            fi

            if ! wget -qO- "$WEB_URL" >/dev/null 2>&1; then
              echo "Web smoke check failed: $WEB_URL"
              docker compose ps
              docker compose logs --tail=80 web
              exit 1
            fi

            docker image prune -f >/dev/null 2>&1 || true

            echo "Deploy finished."
