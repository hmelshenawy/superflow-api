services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: superflow-api:latest
    container_name: superflow-api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      PORT: "3000"
      NODE_ENV: production
      APP_DOMAIN: ${APP_DOMAIN}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      GIT_BRANCH: ${GIT_BRANCH:-unknown}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://${APP_DOMAIN},http://localhost:3000}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-superflow-media}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      NOTIFICATIONS_EMAIL_WEBHOOK: ${NOTIFICATIONS_EMAIL_WEBHOOK:-}
      NOTIFICATIONS_SMS_WEBHOOK: ${NOTIFICATIONS_SMS_WEBHOOK:-}
      NOTIFICATIONS_WHATSAPP_WEBHOOK: ${NOTIFICATIONS_WHATSAPP_WEBHOOK:-}
      NOTIFICATIONS_PUSH_WEBHOOK: ${NOTIFICATIONS_PUSH_WEBHOOK:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v21.0}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      CUSTOMER_PORTAL_URL: ${CUSTOMER_PORTAL_URL:-https://${APP_DOMAIN}}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-superflow-api@0.1.0}
    ports:
      - "127.0.0.1:${API_BIND_PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      traefik.enable: "true"
      traefik.docker.network: "n8n_default"
      traefik.http.routers.superflow-api.entrypoints: "${TRAEFIK_ENTRYPOINTS:-websecure}"
      traefik.http.routers.superflow-api.rule: "(Host(`${APP_DOMAIN}`) || Host(`${APP_DOMAIN_ALT}`)) && (PathPrefix(`/api`) || Path(`/health`))"
      traefik.http.routers.superflow-api.priority: "100"
      traefik.http.routers.superflow-api.tls: "true"
      traefik.http.routers.superflow-api.tls.certresolver: "${TRAEFIK_CERTRESOLVER:-mytlschallenge}"
      traefik.http.services.superflow-api.loadbalancer.server.port: "3000"
    networks:
      - mariadb-bzki_default
      - superflow_internal
      - traefik_public

  web:
    build:
      context: ./superflow-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://${APP_DOMAIN}/api}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    image: superflow-web:latest
    container_name: superflow-web
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    ports:
      - "127.0.0.1:${WEB_BIND_PORT:-3001}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      traefik.enable: "true"
      traefik.docker.network: "n8n_default"
      traefik.http.routers.superflow-web.entrypoints: "${TRAEFIK_ENTRYPOINTS:-websecure}"
      traefik.http.routers.superflow-web.rule: "Host(`${APP_DOMAIN}`) || Host(`${APP_DOMAIN_ALT}`)"
      traefik.http.routers.superflow-web.priority: "10"
      traefik.http.routers.superflow-web.tls: "true"
      traefik.http.routers.superflow-web.tls.certresolver: "${TRAEFIK_CERTRESOLVER:-mytlschallenge}"
      traefik.http.services.superflow-web.loadbalancer.server.port: "3000"
    networks:
      - superflow_internal
      - traefik_public

  redis:
    image: redis:7-alpine
    container_name: superflow-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-superflow_redis_local}", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    deploy:
      resources:
        limits:
          memory: 256M
    volumes:
      - superflow_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-superflow_redis_local}", "ping"]
      interval: 15s
      timeout: 3s
      retries: 3
    networks:
      - superflow_internal

volumes:
  superflow_redis_data:

networks:
  mariadb-bzki_default:
    external: true
  superflow_internal:
    driver: bridge
  traefik_public:
    external: true
    name: n8n_default
